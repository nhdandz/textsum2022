version: '3.8'

# Docker Compose file sử dụng images từ Docker Hub
# Thay YOUR_DOCKERHUB_USERNAME bằng username của bạn

services:
  # ==================== Infrastructure Services ====================
  zookeeper:
    env_file:
      - .env
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_HEAP_OPTS: "-Xms256M -Xmx512M"
    healthcheck:
      test: echo stat | nc localhost 2181 || exit 1
      interval: 50s
      timeout: 20s
      retries: 3
      start_period: 50s
    networks:
      - textsum-network
    restart: always

  kafka:
    env_file:
      - .env
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 100
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms512M -Xmx1G"
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - textsum-network
    restart: always

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8881:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:9092"
      SCHEMA_REGISTRY_HOST_NAME: "schema-registry"
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms256M -Xmx512M"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: curl -f http://localhost:8081 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - textsum-network
    restart: always

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    ports:
      - "8088:8080"
    environment:
      KAFKA_BROKERS: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - textsum-network
    restart: always

  # ==================== Core Services ====================
  algo-control:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-algo-control:${VERSION:-latest}
    container_name: algo-control
    ports:
      - "6789:6789"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - textsum-network
    restart: always
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  app-process:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-single-kafka:${VERSION:-latest}
    container_name: app-process
    ports:
      - "9980:9980"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - textsum-network
    restart: always
    command: python app_process.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  # ==================== Kafka Router Services ====================
  root-kafka:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-root-kafka:${VERSION:-latest}
    container_name: root-kafka
    depends_on:
      kafka:
        condition: service_healthy
      app-process:
        condition: service_started
    networks:
      - textsum-network
    restart: always
    command: python root_kafka.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  multi-kafka:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-root-kafka:${VERSION:-latest}
    container_name: multi-kafka
    depends_on:
      kafka:
        condition: service_healthy
      root-kafka:
        condition: service_started
    networks:
      - textsum-network
    restart: always
    command: python multi_kafka.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  single-kafka:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-single-kafka:${VERSION:-latest}
    container_name: single-kafka
    depends_on:
      kafka:
        condition: service_healthy
      root-kafka:
        condition: service_started
    networks:
      - textsum-network
    restart: always
    command: python single_root.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  # ==================== Single Document Services ====================
  textrank:
    env_file:
      - .env
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-single-texrank:${VERSION:-latest}
    container_name: textrank
    depends_on:
      kafka:
        condition: service_healthy
      single-kafka:
        condition: service_started
    networks:
      - textsum-network
    restart: always
    command: python texrank.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  lexrank:
    env_file:
      - .env
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-single-texrank:${VERSION:-latest}
    container_name: lexrank
    depends_on:
      kafka:
        condition: service_healthy
      single-kafka:
        condition: service_started
    networks:
      - textsum-network
    restart: always
    command: python lexrank.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  lsa:
    env_file:
      - .env
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-single-texrank:${VERSION:-latest}
    container_name: lsa
    depends_on:
      kafka:
        condition: service_healthy
      single-kafka:
        condition: service_started
    networks:
      - textsum-network
    restart: always
    command: python lsa.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  # ==================== Multi Document Services ====================
  m-textrank:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-multi-multexrank:${VERSION:-latest}
    container_name: m-textrank
    depends_on:
      kafka:
        condition: service_healthy
      multi-kafka:
        condition: service_started
    networks:
      - textsum-network
    restart: always
    command: python multi_texrank.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  m-lexrank:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-multi-multexrank:${VERSION:-latest}
    container_name: m-lexrank
    depends_on:
      kafka:
        condition: service_healthy
      multi-kafka:
        condition: service_started
    networks:
      - textsum-network
    restart: always
    command: python multi_lexrank.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  m-lsa:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-multi-multexrank:${VERSION:-latest}
    container_name: m-lsa
    depends_on:
      kafka:
        condition: service_healthy
      multi-kafka:
        condition: service_started
    networks:
      - textsum-network
    restart: always
    command: python multi_lsa.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  # ==================== Additional Services ====================
  clustering:
    env_file:
      - .env
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/textsum2022-text-similarity:${VERSION:-latest}
    container_name: clustering
    ports:
      - "9400:9400"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - textsum-network
    restart: always
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

networks:
  textsum-network:
    name: textsum-network
    driver: bridge

volumes:
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
